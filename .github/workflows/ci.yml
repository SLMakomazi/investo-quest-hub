# GitHub Actions CI/CD Pipeline for Enviro365 Investments
# Runs on every push and pull request to main branch
# Ensures backend compiles, tests pass, and frontend builds successfully

name: CI Pipeline

# Trigger the workflow on push or pull request to main branch
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [ main]

jobs:
  # Job 1: Backend - Compile and Test
  backend:
    name: Backend - Compile & Test
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Java 17 (required by Spring Boot)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Step 3: Compile backend with Maven
      - name: Compile backend
        run: |
          cd backend
          mvn clean compile

      # Step 4: Run backend unit tests
      - name: Run backend tests
        run: |
          cd backend
          mvn test

      # Step 5: Upload test results for visibility
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/target/surefire-reports/

  # Job 2: Frontend - Build
  frontend:
    name: Frontend - Build
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Step 3: Install frontend dependencies
      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      # Step 4: Build frontend
      - name: Build frontend
        run: |
          cd frontend
          npm run build

      # Step 5: Upload build artifacts
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
